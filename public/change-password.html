<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña - CMDS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-top: 4px solid var(--accent-yellow);
            border-radius: var(--radius);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .login-logo {
            max-width: 180px;
            margin-bottom: 24px;
        }
        .error-message { color: var(--danger); margin-bottom: 15px; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="Logo_CMDS.png" alt="CMDS Antofagasta" class="login-logo">
        <h2 style="margin-bottom: 10px; font-family: var(--font-display); color: var(--text-main);">Actualizar Contraseña</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;">Por seguridad, debes cambiar la contraseña por defecto antes de continuar.</p>
        <form id="change-pwd-form">
            <div class="error-message" id="error-msg">Error.</div>
            <div class="form-group" style="margin-bottom: 20px; text-align: left;">
                <label>Nueva Contraseña (mín. 6 caracteres)</label>
                <input type="password" id="new_password" required minlength="6">
            </div>
            <div class="form-group" style="margin-bottom: 30px; text-align: left;">
                <label>Confirmar Contraseña</label>
                <input type="password" id="confirm_password" required minlength="6">
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;">Guardar y Continuar</button>
        </form>
    </div>

    <script>
        document.getElementById('change-pwd-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new_password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const btn = document.querySelector('button');
            const errorMsg = document.getElementById('error-msg');
            
            if (newPassword !== confirmPassword) {
                errorMsg.textContent = 'Las contraseñas no coinciden.';
                errorMsg.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Guardando...';
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/api/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ newPassword })
                });
                const data = await res.json();
                
                if (res.ok && data.success) {
                    window.location.href = data.redirect;
                } else {
                    errorMsg.textContent = data.error || 'Error al cambiar contraseña';
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Guardar y Continuar';
                }
            } catch (err) {
                errorMsg.textContent = 'Error de conexión';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Guardar y Continuar';
            }
        });
    </script>
</body>
</html>
